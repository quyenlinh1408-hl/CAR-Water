<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>Unity Web Player | DeepSeaDriver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div class="sea-glow" aria-hidden="true"></div>
    <main class="page-shell">
      <section class="top-panel">
        <h1 class="project-title">DeepSeaDriver</h1>
        <div class="status-strip">
          <span class="status-pill">Trang thai <strong id="load-state">Dang khoi tao</strong></span>
        </div>
      </section>

      <section>
        <article class="viewport-wrap cinematic-frame">
          <div id="unity-container" class="unity-desktop">
            <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
            <div id="unity-loading-bar">
              <div id="unity-logo"></div>
              <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
              </div>
            </div>
            <div id="unity-warning"> </div>
            <div id="unity-footer">
              <div id="unity-logo-title-footer"></div>
              <div id="unity-fullscreen-button"></div>
              <div id="unity-build-title">DeepSeaDriver</div>
            </div>
          </div>
          <div class="cinematic-overlay" aria-hidden="true">
            <div class="scene-tag">Abyssal Expedition</div>
            <div class="scene-quote">Silent water. Heavy pressure. Keep moving.</div>
          </div>
          <div class="cinematic-hud" aria-hidden="true">
            <span>Depth 180m</span>
            <span>Current 1.4m/s</span>
            <span>Temp 7.8C</span>
          </div>
          <p id="progress-text" class="progress-text">Dang danh thuc hanh trinh duoi bien sau...</p>
        </article>
      </section>
    </main>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadState = document.querySelector("#load-state");
      var progressText = document.querySelector("#progress-text");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') {
          div.style = 'background: #4f1111; color: #ffdede; padding: 10px;';
          if (loadState) {
            loadState.textContent = 'Loi';
          }
          if (progressText) {
            progressText.innerHTML = '<span class="warn">Khoi tao that bai. Thu tai lai trang.</span>';
          }
        }
        else {
          if (type == 'warning') div.style = 'background: #5f480f; color: #ffe8b2; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/docs.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/docs.data.gz",
        frameworkUrl: buildUrl + "/docs.framework.js.gz",
        codeUrl: buildUrl + "/docs.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "DeepSeaDriver",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "100%";
        canvas.style.height = "auto";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      async function decompressGzipFile(url, mimeType) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("Unable to load " + url + " (HTTP " + response.status + ")");
        }

        const compressedData = await response.arrayBuffer();
        if (!("DecompressionStream" in window)) {
          throw new Error("This browser does not support gzip decompression for Unity WebGL assets.");
        }

        const decompressedStream = new Blob([compressedData]).stream().pipeThrough(new DecompressionStream("gzip"));
        const decompressedData = await new Response(decompressedStream).arrayBuffer();
        return URL.createObjectURL(new Blob([decompressedData], { type: mimeType }));
      }

      (async () => {
        const dataUrl = await decompressGzipFile(buildUrl + "/docs.data.gz", "application/octet-stream");
        const frameworkUrl = await decompressGzipFile(buildUrl + "/docs.framework.js.gz", "application/javascript");
        const codeUrl = await decompressGzipFile(buildUrl + "/docs.wasm.gz", "application/wasm");

        config.dataUrl = dataUrl;
        config.frameworkUrl = frameworkUrl;
        config.codeUrl = codeUrl;

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
            if (loadState) {
              loadState.textContent = "Tai " + Math.round(progress * 100) + "%";
            }
            if (progressText) {
              progressText.textContent = "Dong bo moi truong: " + Math.round(progress * 100) + "%";
            }
          }).then((unityInstance) => {
            document.querySelector("#unity-loading-bar").style.display = "none";
            if (loadState) {
              loadState.textContent = "San sang";
            }
            if (progressText) {
              progressText.innerHTML = '<span class="ok">San sang lan xuong vung nuoc toi.</span>';
            }
            document.querySelector("#unity-fullscreen-button").onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }).catch((message) => {
            alert(message);
          });
        };

        document.body.appendChild(script);
      })().catch((message) => {
        alert(message);
      });

    </script>
  </body>
</html>
